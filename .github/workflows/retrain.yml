name: Continuous Training (Weekly Retrain)

on:
  schedule:
    # This standard cron syntax means "Minute 0, Hour 0, Every Friday"
    - cron: '0 0 * * 5'
  workflow_dispatch: # This adds a button so you can trigger it manually whenever you want!

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: pip install --no-cache-dir -r requirements.txt

    - name: Run Data Pipeline (Fetch & Clean)
      run: |
        python fetch_data.py
        python clean_data.py

    - name: Run Feature Engineering
      run: python engineer_features.py

    - name: Retrain Machine Learning Model
      run: python train_model.py

    - name: Commit and Push the Updated Model
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add app/stock_model.pkl data/
        git commit -m "🤖 Auto-retrain: Updated model with latest market data" || echo "No new data to commit"
        git push